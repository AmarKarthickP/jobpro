<form class="form-signin form-signup hide" role="form">
    <div class="page-card-body">
        <div class="form-group">
            <label class="form-label sr-only" for="signup_fullname">{{ _("Full Name") }}</label>
            <input type="text" id="signup_fullname" class="form-control" name="full_name" placeholder="{{ _('Jane Doe') }}"
                required autofocus autocomplete="name">
        </div>
        <div class="form-group">
            <label class="form-label sr-only" for="signup_email">{{ _("Email") }}</label>
            <input type="email" id="signup_email" name="email" class="form-control"
                placeholder="{{ _('jane@example.com') }}" required autocomplete="username">
        </div>
        <!-- Added mobile field -->
        <div class="form-group">
            <div class="mobile-field">
                <label class="form-label sr-only" for="signup_mobile">{{ _("Mobile") }}</label>
                <input
                    type="tel"
                    id="signup_mobile"
                    name="mobile"
                    class="form-control mobile-input"
                    placeholder="9876543210"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    inputmode="numeric"
                    required
                >
            </div>
        </div>
        <!-- Added password field -->
        <div class="form-group">
            <label class="form-label sr-only" for="signup_password">{{ _("Password") }}</label>
            <div class="password-field">
                <input style="padding-left: 8px;" type="password" id="signup_password" name="password" class="form-control" placeholder="•••••" minlength="8"
                    title="Password must be at least 8 characters"
                    autocomplete="new-password" required>
                <span toggle="#signup_password" class="toggle-password text-muted">{{ _('Show') }}</span>
            </div>
        </div>
    </div>
    <div class="page-card-actions">
        <button class="btn btn-sm btn-primary btn-block custom-signup-btn"
            type="submit">{{ _("Sign up") }}</button>

        <p class="text-center sign-up-message">
            <a href="#login" class="blue">{{ _("Have an account? Login") }}</a>
        </p>
    </div>
</form>
